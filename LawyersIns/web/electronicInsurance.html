							<div>
								<h2 class="questionHeading">Electronic Selection / Rejection Option</h2>
							</div>
							<div class="form">
								<table class="question practiceManagement" width="80%" cellpadding="0" cellspacing="0">
									<tr>
										<td colspan="3">Your insurer may be required by law to obtain consent from insureds prior to engaging in any electronic delivery of insurance policies and/or other supporting documents in connection with the policy. You have the right to:</td>
									</tr>
									<tr>
										<td></td>
										<td colspan="2">Select electronic delivery.</td>
									</tr>
									<tr>
										<td></td>
										<td colspan="2">Select electronic delivery and paper delivery.</td>
									</tr>
									<tr>
										<td></td>
										<td colspan="2">Reject electronic delivery.</td>
									</tr>
									<tr>
										<td></td>
										<td colspan="2">Withdraw your consent if you decide you no longer want to receive electronic delivery of your insurance policy and/or other supporting documents in connection with your insurance policy.</td>
									</tr>
									<tr>
										<td>1.</td>
										<td>
											<div id="error_isElectronicInsurance" class="error"></div>
											<span class="mendatory">*</span>SELECTION OF ELECTRONIC INSURANCE POLICY DELIVERY OPTION
										</td>
										<td nowrap>
											<span class="radio-inline"><input type="radio" name="isElectronicInsurance" id="isElectronicInsuranceY" value="Y" onclick="policyDocumentsDeliveryOption(this.name);"/>Yes</span>
											<span class="radio-inline"><input type="radio" name="isElectronicInsurance" id="isElectronicInsuranceN" value="N" onclick="policyDocumentsDeliveryOption(this.name);"/>No</span>
										</td>
									</tr>
									<tr>
										<td></td>
										<td>
											<div style="width: 90%">I select the option to receive the following documents in connection with my insurance policy electronically, for myself and all those covered under the policy. I acknowledge I may no longer receive paper copies of my insurance policy, unless I advise my insurer to continue to provide paper copies in addition to electronic copies.</div>
										</td>
										<td></td>
									</tr>
									<tr>
										<td></td>
										<td colspan="2">Insurance Policy Identification.</td>
									</tr>
									<tr>
										<td></td>
										<td colspan="2">Card Notices of Cancellation.</td>
									</tr>
									<tr>
										<td></td>
										<td colspan="2">Notices of Nonrenewal.</td>
									</tr>
									<tr>
										<td></td>
										<td colspan="2">Other supporting documents in connection with my insurance policy.</td>
									</tr>
									
									<tr>
										<td>2.</td>
										<td>
											<div id="error_isElectronicAndPaperDelivery" class="error"/>
											<span class="mendatory">*</span>SELECTION OF ELECTRONIC DELIVERY AND PAPER DELIVERY OPTION
										</td>
										<td>
											<span class="radio-inline"><input type="radio" name="isElectronicAndPaperDelivery" id="isElectronicAndPaperDeliveryY" value="Y" onclick="policyDocumentsDeliveryOption(this.name);"/>Yes</span>
											<span class="radio-inline"><input type="radio" name="isElectronicAndPaperDelivery" id="isElectronicAndPaperDeliveryN" value="N" onclick="policyDocumentsDeliveryOption(this.name);"/>No</span>
										</td>
									</tr>
									<tr>
										<td></td>
										<td>
											<div style="width: 90%">I select the option to receive both electronic and paper copies of my insurance policy and/or other supporting documents in connection with my insurance policy, for myself and all those covered under the policy.</div>
										</td>
										<td></td>
									</tr>
									<tr>
										<td>3.</td>
										<td>
											<div id="error_isElectronicDeliveryRejection" class="error"/>
											<span class="mendatory">*</span>REJECTION OF ELECTRONIC DELIVERY OPTION
										</td>
										<td>
											<span class="radio-inline"><input type="radio" name="isElectronicDeliveryRejection" id="isElectronicDeliveryRejectionY" value="Y" onclick="policyDocumentsDeliveryOption(this.name);"/>Yes</span>
											<span class="radio-inline"><input type="radio" name="isElectronicDeliveryRejection" id="isElectronicDeliveryRejectionN" value="N" onclick="policyDocumentsDeliveryOption(this.name);"/>No</span>
										</td>
									</tr>
									<tr>
										<td></td>
										<td>
											<div style="width: 90%">I reject the option to receive my insurance policy and/or other supporting documents in connection with my insurance policy electronically, for myself and all those covered under the policy. I will continue to receive paper copies of such documents.</div>
										</td>
										<td></td>
									</tr>
									<tr id="RenewBusiness" style="display: none;">
										<td>4.</td>
										<td>
											<div id="error_isElectronicDeliveryWithdrawalConsent" class="error"/>
											<span class="mendatory">*</span>WITHDRAWAL OF CONSENT OF ELECTRONIC DELIVERY
										</td>
										<td>
											<span class="radio-inline"><input type="radio" name="isElectronicDeliveryWithdrawalConsent" id="isElectronicDeliveryWithdrawalConsentY" value="Y" onclick="policyDocumentsDeliveryOption(this.name);"/>Yes</span>
											<span class="radio-inline"><input type="radio" name="isElectronicDeliveryWithdrawalConsent" id="isElectronicDeliveryWithdrawalConsentN" value="N" onclick="policyDocumentsDeliveryOption(this.name);"/>No</span>
										</td>
									</tr>
									<tr id="RenewBusiness"  style="display: none;">
										<td></td>
										<td>
											<div style="width: 90%">I withdraw my previous consent of electronic delivery of my insurance policy and/or other supporting documents in connection with my insurance policy, for myself and all those covered under the policy. I elect to receive paper copies of such documents in the future.</div>
										</td>
										<td></td>
									</tr>
									<tr>&nbsp;</tr>
									<tr>&nbsp;</tr>
									<tr>
										<td colspan="3" align="center" style="font-weight: bold;">ELECTRONIC DELIVERY DISCLOSURE </td>
									</tr>
									<tr>
										<td colspan="3">The policyholder who elects to allow for insurance policy and/or other supporting documents in connection with the insurance policy to be sent to the electronic mail address provided should be diligent in updating the electronic mail address provided to the insurer in the event that the address should change.</td>
									</tr>
								</table>
