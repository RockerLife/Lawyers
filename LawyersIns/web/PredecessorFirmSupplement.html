   <div >

				<div id="attorneyGrid" class="padding10">
					<div  class="Confirmation" id="predecessorSupplement_freeform_contextdata_02" align="center">
										<label name="pageMsg" id="pageMsg" />
								</div>
								<div class="row">
								<div class="floatLeft">
									<b>Predecessor Firm Supplement</b>
								</div>
								<div class="floatRight">
									
								</div>
								</div>
					<table class="gridTable sectionPadding " cellpadding="0" cellspacing="0" style="width: 100%;" id="PredecessorSupplement_list_01">
						<thead id="rowMake">
								<tr>
								
								<td colspan="8" style="padding: 0px;">
									<span id="ajax_error_needFirstRow" class="error"/>
									<span id="ajax_error_completeRow" class="error"/>
									
									</td>
								</tr>
								<tr>
										<th width="15%">Firm Name</th>
										<th width="12%">Date of Acquisition or Merger</th>
										<th width="10%">Type of Legal Entity</th>
										<th width="12%"># of Attorneys at Firm at Dissolution</th>
										<th width="15%"># of Attorneys for Whom Coverage is Sought</th>
										<th width="10%">Insurer at Dissolution</th>
										<th width="10%">Was ERP Purchased</th>
										<th width="11%">ERP Expiration Date</th>
										<th></th>
									</tr>
								</thead>
					<tbody id="rowMake">
					<tr id="PredecessorSupplement_list_header_01" class="no-padding">
						
						<td>
							<span id="block_field_FirmName"></span>
						</td>
						<td id="block_field_DateOfAcquisation"/>
						<td id="block_field_TypeOfEntity"/>
						<td id="block_field_NumberOfAttorneyAtDiss"/>
						<td id="block_field_NumberOfAttorneyAtApplFirm"/>
						<td id="block_field_InsurerAtDissolution"/>
						<td id="block_field_IsERPPurchased"/>
						<td id="block_field_ERPExpDate"/>
						<td id="block_field_ProdecessorFirmKey"/>
					</tr>
					<tr id="PredecessorSupplement_list_mom_data_01"> 
						<td nowrap class="grid-form-control-90">
						
						<span id="block_field_FirmName">
							<input name="FirmName" type="text" class="inputbox" id="ajax_field_FirmName"/></span>
						</td>
						<td nowrap class="iconsStyle2">
						<!-- <span class="input-group-addon"><i class="fa fa-calendar">&nbsp;</i></span> -->
						<span id="block_field_DateOfAcquisation">
							<input name="DateOfAcquisation" type="text"  style="width: 80px !important" id="ajax_field_DateOfAcquisation" onkeyup="applyDateFormat(this,event);" placeholder="MM/DD/YYY" />
						</span>
						</td>
						<td nowrap>
						<span id="block_field_TypeOfEntity">
									<input name="TypeOfEntity" type="text" class="inputbox" id="ajax_field_TypeOfEntity" width="60px"/>
							</span>
						</td>
						<td nowrap id="block_field_NumberOfAttorneyAtDiss">
							<input name="NumberOfAttorneyAtDiss" type="text" class="inputbox" id="ajax_field_NumberOfAttorneyAtDiss" onclick="loadPredecessorSupplement();" onkeypress="return IsNumeric(this, event, true, true, '');" ondrop="return false;" onpaste="return false;"/>
						</td>
						
						<td nowrap>
						<div id="block_field_NumberOfAttorneyAtApplFirm">
							<input name="NumberOfAttorneyAtApplFirm" type="text" style="width: 80px"  id="ajax_field_NumberOfAttorneyAtApplFirm" onclick="loadPredecessorSupplement();" onkeypress="return IsNumeric(this, event, true, true, '');" ondrop="return false;" onpaste="return false;" />
							 </div>
						</td>
						<td nowrap>
							<div id="block_field_InsurerAtDissolution">
							<input name="InsurerAtDissolution" type="text"  style="width: 80px"  id="ajax_field_InsurerAtDissolution" />
								
							</div>
						</td>
						<td>
							<span class="radio-inline" id="block_field_IsERPPurchased">
								<input type="radio" name="IsERPPurchased" id="ajax_field_IsERPPurchased_FixedValue" value="Y" onchange="disableERPExpirationDate(this.id,this.value)"/><span class="floatRight">Yes</span></span> 
							<span class="radio-inline" id="block_field_IsERPPurchased"><input type="radio" name="IsERPPurchased" id="ajax_field_IsERPPurchased_FixedValue" value="N" onchange="disableERPExpirationDate(this.id,this.value)"/><span class="floatRight">No</span></span>
							
						</td>
						<td nowrap  class="iconsStyle2">
							
							<span id="block_field_ERPExpDate">
							<input name="ERPExpDate" type="text"  style="width: 80px !important" id="ajax_field_ERPExpDate" onkeyup="applyDateFormat(this,event);" placeholder="MM/DD/YYY" />
							</span>
						</td>
						<td id="block_field_ProdecessorFirmKey">
							<input name="ProdecessorFirmKey" id="ajax_field_ProdecessorFirmKey" type="hidden" />
