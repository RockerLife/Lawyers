<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<meta http-equiv="cache-control" content="max-age=0" />
		<meta http-equiv="cache-control" content="no-cache" />
		<meta http-equiv="expires" content="0" />
		<meta http-equiv="pragma" content="no-cache" />
		
		<title>Payment Method</title>
		<link href="css/bootstrap.css" rel="stylesheet" type="text/css" />
		<link href="css/font-awesome.css" rel="stylesheet" type="text/css" />
		
		<script type="text/javascript" src="js/jquery.js"></script>
		<script src="https://paymentwidget.anddone.com/andDone.js"></script>
		<script language="javascript" src="script/checkout.js"/>
		<script type="text/javascript" src="script/common.js"></script>
		<script language="javascript" src="script/lawyers.js"/>
		<script type="text/javascript" src="script/manage.js"></script>
		
		<style>
			#cover {
			    display: none;
			    position: absolute;
			    top: 0px;
			    left: 0px;
			    opacity: 0.4;
			    filter: alpha(opacity = 40);
			    background-color: #000000;
			    z-index: 99;
			    width: 100%;
			    height: 100%;
			}
			#andDoneSessionTimeOut {
			    display: none;
			    position: absolute;
			    z-index: 9999;
			    xbackground: white;
			    padding: 0px;
			    xborder: 1px solid #23769c;
			}
			#andDonePaymentFailureOut {
			    display: none;
			    position: absolute;
			    z-index: 9999;
			    xbackground: white;
			    padding: 0px;
			    xborder: 1px solid #23769c;
			}
			#andDoneSuccessFull {
			    display: none;
			    position: absolute;
			    z-index: 9999;
			    xbackground: white;
			    padding: 0px;
			    xborder: 1px solid #23769c;
			}
			
			/*   @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@  oval button css    @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@      */
			a.ovalbutton {
				background: #3892d1;
				display: block;
				float: left;
				font: normal 12px Verdana, Arial, Helvetica, sans-serif;
				/* Change 13px as desired */
				line-height: 26px;
				/* This value + 4px + 4px (top and bottom padding of SPAN) must equal height of button background (default is 24px) */
				height: 26px; /* Height of button background height */
				padding: 4px 18px;
				text-decoration: none;
				text-transform: uppercase;
				-webkit-border-radius: 4px;
				-webkit-border-radius: 4px;
				-webkit-border-radius: 4px;
				-webkit-border-radius: 4px;
				-moz-border-radius: 4px;
				behavior: url(css/htc/PIE.htc);
				border-radius: 4px;
				color: #ffffff;
				cursor: pointer;
				margin-left: 3px;
			}
			
			a:link .ovalbutton, a:visited .ovalbutton, a:active .ovalbutton {
				color: #ffffff; /*button text color*/
				margin-left: 2px;
			}
			
			a.ovalbutton span {
				display: block;
				color: #fff;
				/*Set 11px below to match value of 'padding-left' value above*/
			}
			.ovalbutton span b{font-weight: normal;}
			a.ovalbutton span label {
				font-size: 10px;
			}
			
			a.ovalbutton:hover { /* Hover state CSS */
				background: #3088c6;
			}
			
			a.ovalbutton:hover span { /* Hover state CSS */
				color: #ffffff;
			}
			
			/* @@@@@@@@@@@@@@@@@@@@  popup css    @@@@@@@@@@@@@@@@@@@ */
			
			#progressBarDiv {
				display: none;
				position: fixed;
				top: 0px;
				left: 0px;
				xopacity: 0.1;
				xfilter: alpha(opacity =   100);
				xbackground-color: #000000;
				z-index: 1000000;
				width: 100%;
				background: url(image/29.gif) no-repeat center top;
				background-position: 50% 300px;
				background-size: 50px;
			}
		</style>
	</head>
	<body onload="andDoneOnLoad();">
		<!-- Bootstrap Core JavaScript -->
		<div id="cover"></div>
		
		<!-- Modal -->
		<div id="andDoneSessionTimeOut" class="modal">
			<div class="modal-dialog" style="width: 700px">
				<!-- Modal content-->
				<div class="modal-content">
					<div class="modal-header">
						<a class="close" href="#" onclick="onExistButtonClick('andDonePaymentFailure');">
							<i class="fa fa-close">&nbsp;</i>
						</a>
						<h4 class="modal-title">Session timed out!</h4>
					</div>
					<div class="modal-body" style="height: 100px; text-align: center; font-size: 16px;">
						<br>
						<span id="andDoneSessionTimeOutFlag">Your session has timed out.</span>
					</div>
					<div class="modal-footer">
						<div class="buttonwrapper">
							<!-- //<a class="ovalbutton">Save</a> -->
							<a class="ovalbutton" onclick="onExistButtonClick('andDonePaymentFailure');">Close</a>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!-- Modal -->
		<div id="andDonePaymentFailureOut" class="modal">
			<div class="modal-dialog" style="width: 700px">
				<!-- Modal content-->
				<div class="modal-content">
					<div class="modal-header">
						<a class="close" href="#" onclick="onExistButtonClick('andDonePaymentFailure');">
							<i class="fa fa-close">&nbsp;</i>
						</a>
						<h4 class="modal-title">Please try again!</h4>
					</div>
					<div class="modal-body" style="height: 100px; text-align: center; font-size: 16px;">
						<br>
						<span id="andDonePaymentFailureOutFlag">Your payment has been failed. Please try again.</span>
					</div>
					<div class="modal-footer">
						<div class="buttonwrapper">
							<!-- //<a class="ovalbutton">Save</a> -->
							<a class="ovalbutton" onclick="onExistButtonClick('andDonePaymentFailure');">Close</a>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div id="andDoneSuccessFull" class="modal">
			<div class="modal-dialog" style="width: 700px">
				<!-- Modal content-->
				<div class="modal-content">
					<div class="modal-header">
						<!-- <a class="close" href="#" onclick="{closePopUp('andDoneSuccessFull'); }">
							<i class="fa fa-close">&nbsp;</i>
						</a> -->
						<h4 class="modal-title">Please wait!</h4>
					</div>
					<div class="modal-body" style="height: 100px; text-align: center; font-size: 16px;">
						<br>
						<span id="andDoneSuccessFullFlag">Please be patient while your policy is being issued.</span>
					</div>
					<div class="modal-footer">
						<div class="buttonwrapper">
							<!-- <a class="ovalbutton" onclick="{closePopUp('andDoneSuccessFull'); }">Close</a> -->
						</div>
					</div>
				</div>
			</div>
		</div>
		<form>
			<div id="mywidget" ></div>
			<table id="andDone_freeform_contextdata_999">
				<tr>
					<td>
					<input type="hidden" name="jsessionid" id="jsessionid" />
					<input type="hidden" name="isvalidid" id="isvalidid" value="" />
					<a id="andDonePaymentSuccess" style="display: none;" href="javascript:submitform('andDonePaymentSuccess.html','andDone.andDonePaymentSuccess','','');" >Continue</a>
					<a id="andDonePaymentFailure" style="display: none;" href="javascript:submitform('andDonePaymentFailure.html','andDone.andDonePaymentFailure','','');" >Failure</a>
					</td>
				</tr>
			</table>
		</form>
	</body>
</html>
